{% extends "base.html" %}

{% block content %}

<!-- {% if form.errors %}
    <p>Your username and password didn't match. Please try again.</p>
    {% endif %} -->

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="container bg-white">
            <div class="row d-flex justify-content-center mt-5">
                <div class="col-md-6 mt-3">
                    <h2 class="mt-5"> <b>Manul</b></h2>
                </div>
                <div class="col-md-6">
                    <div class="mt-5">
                        <div class="card-body">
                            <div class="align-self-center">

                                <div class="">

                                    <div class="mb-3 row">
                                        <label  class="form-label col-12"><b>Имя пользователя:</b></label>
                                        <div class="col-12 " >
                                            <input  name='username' value="{{form.username.value|default_if_none:"" }}" class="form-control"> 
                                        </div>
                                </div>

                                <div class="mb-3 row">
                                    <label  class="form-label col-12"> <b>Пароль:</b></label>
                                    <div class="col-12">
                                        <input type='password'  name='password' value="{{form.password.value|default_if_none:"" }}" class="form-control"> 
                                    </div>

                            </div>

                            <div class="d-grid gap-2">
                                <button class="btn btn-primary btn-lg btn-block" type="submit"> Войти </button> 
                                <input type="hidden" name="next" value="{{ next }}">
                            </div>


                        </div>
                        {% if form.errors %}
                        <div class="alert alert-warning  w-100 ">Имя пользователя или пароль введены неверно</div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>

        </div>
        </div>
    </form>
    <style>
.main-title{
  margin-top:36pxl;  
  font-size: 1.1875rem;
}
body {
background:white
}


</style>
{% endblock %}
